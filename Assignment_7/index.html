<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎨 CSS Animation Gallery</h1>

<div class="container">

    
    <div class="card">
        <h2>Bouncing Ball</h2>
        <div class="ball"></div>
    </div>

    
    <div class="card">
        <h2>Loading Spinner</h2>
        <div class="loader"></div>
    </div>

    
    <div class="card">
        <h2>Color Changing Box</h2>
        <div class="color-box"></div>
    </div>

    
    <div class="card">
        <h2>Growing Box</h2>
        <div class="grow-box"></div>
    </div>

    
    <div class="card">
        <h2>Sliding Text</h2>
        <p class="slide-text">Welcome to CSS Animations</p>
    </div>

    
    <div class="card">
        <h2>Rotating Rectangle</h2>
        <div class="rectangle"></div>
    </div>

    
    <div class="card">
        <h2>Floating Card</h2>
        <div class="floating-card">
            <h3>ANKUSH KUMAR</h3>
        </div>
    </div>
  
    <div class="card">
        <h2>Heartbeat</h2>
        <div class="heart">❤️</div>
    </div>

    
    <div class="card">
        <h2>Multiple Transform</h2>
        <div class="multi-box"></div>
    </div>

    
    <div class="card">
        <h2>Rocket Launch</h2>
        <div class="rocket">🚀</div>
    </div>

</div>

</body>
</html>
